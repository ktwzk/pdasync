services:
  global:
    build:
      context: .
      dockerfile: Dockerfile.global
    ports:
      - "${GLOBAL_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - CONTROL_TOKEN=${CONTROL_TOKEN:-}
    restart: unless-stopped
    volumes:
      - ./videos:/app/videos

  local:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "${LOCAL_PORT:-8081}:8081"
    environment:
      - PORT=8081
      - HOST=0.0.0.0
      - UPSTREAM_URL=http://global:8080
      - CONTROL_TOKEN=${CONTROL_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - global
    volumes:
      - ./videos:/app/videos
