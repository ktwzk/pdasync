<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR Code Generator</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111;
        --fg: #eee;
        --muted: #888;
        --input-bg: #222;
        --border: #333;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 24px;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      h1 { margin: 0 0 16px; font-size: 24px; }
      .config {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .field {
        flex: 1;
        min-width: 200px;
      }
      .field label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
      }
      .field input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--input-bg);
        color: var(--fg);
        font: inherit;
      }
      .controls {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      button {
        padding: 10px 16px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #333;
        color: var(--fg);
        font: inherit;
        cursor: pointer;
      }
      button:hover { background: #444; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 16px;
      }
      .qr {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 12px;
        background: #fff;
        border-radius: 8px;
      }
      .qr img {
        width: 120px;
        height: 120px;
      }
      .qr .label {
        margin-top: 8px;
        font-size: 11px;
        color: #333;
        text-align: center;
      }
      .qr .type {
        font-size: 10px;
        color: #666;
        text-transform: uppercase;
      }
      .section-title {
        margin: 24px 0 12px;
        font-size: 14px;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        padding-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <h1>QR Code Generator</h1>
    
    <div class="config">
      <div class="field">
        <label>Local Server URL (e.g. http://192.168.1.100:8081)</label>
        <input type="text" id="localUrl" placeholder="http://192.168.1.100:8081">
      </div>
      <div class="field">
        <label>VPS Server URL (e.g. http://your-vps.domain)</label>
        <input type="text" id="vpsUrl" placeholder="http://your-vps.domain">
      </div>
    </div>
    
    <div class="controls">
      <button id="genAll">Generate All (160)</button>
      <button id="genLocal">Generate Local (80)</button>
      <button id="genLte">Generate LTE (80)</button>
      <button id="genRange">Generate Range...</button>
    </div>

    <div id="output"></div>

    <script type="module">
      import { getAllPasswords } from "./lte-passwords.js";

      const localInput = document.getElementById("localUrl");
      const vpsInput = document.getElementById("vpsUrl");
      const output = document.getElementById("output");

      const passwords = getAllPasswords();

      function qrApi(text) {
        const encoded = encodeURIComponent(text);
        return `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encoded}`;
      }

      function createQr(url, slot, type) {
        const div = document.createElement("div");
        div.className = "qr";
        
        const img = document.createElement("img");
        img.src = qrApi(url);
        img.alt = `QR for ${url}`;
        
        const typeLabel = document.createElement("div");
        typeLabel.className = "type";
        typeLabel.textContent = type;
        
        const label = document.createElement("div");
        label.className = "label";
        label.textContent = slot;
        
        div.appendChild(img);
        div.appendChild(typeLabel);
        div.appendChild(label);
        
        return div;
      }

      function renderSection(title, urls) {
        if (urls.length === 0) return;
        
        const section = document.createElement("div");
        
        const titleEl = document.createElement("div");
        titleEl.className = "section-title";
        titleEl.textContent = title;
        section.appendChild(titleEl);
        
        const grid = document.createElement("div");
        grid.className = "grid";
        
        for (const { url, slot, type } of urls) {
          grid.appendChild(createQr(url, slot, type));
        }
        
        section.appendChild(grid);
        output.appendChild(section);
      }

      function generateLocal(start = 1, end = 80) {
        const localUrl = localInput.value.replace(/\/$/, "");
        if (!localUrl) {
          alert("Please enter local server URL");
          return;
        }
        
        const urls = [];
        for (let slot = start; slot <= end; slot++) {
          urls.push({
            url: `${localUrl}/client.html?slot=${slot}`,
            slot: `Slot ${slot}`,
            type: "Wi-Fi"
          });
        }
        
        renderSection(`Local Wi-Fi (slots ${start}-${end})`, urls);
      }

      function generateLte(start = 1, end = 80) {
        const vpsUrl = vpsInput.value.replace(/\/$/, "");
        if (!vpsUrl) {
          alert("Please enter VPS server URL");
          return;
        }
        
        const urls = [];
        
        for (let i = start - 1; i < end; i++) {
          const p = passwords[i];
          urls.push({
            url: `${vpsUrl}/client-lte.html?slot=${p.password}`,
            slot: `${p.password} (slot ${p.slot})`,
            type: "LTE"
          });
        }
        
        renderSection(`LTE (slots ${start}-${end})`, urls);
      }

      document.getElementById("genAll").addEventListener("click", () => {
        output.innerHTML = "";
        generateLocal(1, 80);
        generateLte(1, 80);
      });

      document.getElementById("genLocal").addEventListener("click", () => {
        output.innerHTML = "";
        generateLocal(1, 80);
      });

      document.getElementById("genLte").addEventListener("click", () => {
        output.innerHTML = "";
        generateLte(1, 80);
      });

      document.getElementById("genRange").addEventListener("click", () => {
        const range = prompt("Enter range (e.g. 1-20 or 40-60):");
        if (!range) return;
        
        const match = range.match(/^(\d+)-(\d+)$/);
        if (!match) {
          alert("Invalid format. Use: start-end (e.g. 1-20)");
          return;
        }
        
        const start = Math.max(1, Math.min(80, parseInt(match[1], 10)));
        const end = Math.max(1, Math.min(80, parseInt(match[2], 10)));
        
        if (start > end) {
          alert("Start must be less than end");
          return;
        }
        
        output.innerHTML = "";
        generateLocal(start, end);
        generateLte(start, end);
      });
    </script>
  </body>
</html>
