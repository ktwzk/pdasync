<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    >
    <title>Sync Client</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --fg: #fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }

      #overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #000;
        transition: opacity 0.3s ease;
      }

      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #preloader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      #preloader.hidden {
        display: none;
      }

      .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      #statusText {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        text-align: center;
      }

      #playButton {
        display: none;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid #fff;
        background: transparent;
        cursor: pointer;
        position: relative;
      }

      #playButton.visible {
        display: block;
      }

      #playButton::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 54%;
        transform: translate(-30%, -50%);
        border-style: solid;
        border-width: 14px 0 14px 24px;
        border-color: transparent transparent transparent #fff;
      }

      #blackScreen {
        display: none;
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 100;
      }

      #blackScreen.visible {
        display: block;
      }

      #hud {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        font-family: "SF Mono", "Menlo", "Consolas", monospace;
        pointer-events: none;
        opacity: 0;
        transition: opacity 160ms ease;
      }

      body.debug #hud {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <video id="video" playsinline muted preload="metadata"></video>

    <div id="overlay">
      <div id="preloader">
        <div class="spinner"></div>
        <div id="statusText">Preparing…</div>
      </div>
      <button id="playButton" type="button" aria-label="Play"></button>
    </div>

    <div id="blackScreen"></div>

    <div id="hud">
      <span id="hudLeft"></span>
      <span id="hudRight"></span>
    </div>

    <script type="module" src="/client-lte.js"></script>
  </body>
</html>
