<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    >
    <title>Sync Client</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --fg: #fff;
        --muted: rgba(255, 255, 255, 0.72);
        --panel: rgba(18, 18, 18, 0.88);
        --accent: #82f0c8;
      }

      body.lte {
        --accent: #fff;
      }

      body.lte #overlay {
        background: #000;
      }

      body.lte #panel {
        border: none;
        background: none;
        backdrop-filter: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0;
        width: auto;
      }

      body.lte #clientTitle,
      body.lte #slotLine,
      body.lte #statusLine {
        display: none;
      }

      body.lte #startButton {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid #fff;
        background: transparent;
        color: #fff;
        font-size: 0;
        padding: 0;
        margin-top: 0;
        position: relative;
      }

      body.lte #startButton::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 52%;
        transform: translate(-30%, -50%);
        border-style: solid;
        border-width: 14px 0 14px 24px;
        border-color: transparent transparent transparent #fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: "SF Mono", "Menlo", "Consolas", monospace;
      }

      body {
        position: relative;
      }

      #video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }

      #overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(130, 240, 200, 0.12), transparent 32%),
          linear-gradient(180deg, rgba(12, 12, 12, 0.9), rgba(0, 0, 0, 0.98));
      }

      #panel {
        width: min(92vw, 520px);
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        background: var(--panel);
        backdrop-filter: blur(12px);
      }

      #panel h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.1;
      }

      #panel p {
        margin: 0 0 10px;
        color: var(--muted);
        line-height: 1.4;
      }

      #startButton {
        width: 100%;
        margin-top: 16px;
        padding: 14px 18px;
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: #09130f;
        font: inherit;
        font-weight: 700;
      }

      #hud {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 160ms ease;
      }

      body.debug #hud {
        opacity: 1;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <video id="video" playsinline muted preload="auto"></video>

    <div id="overlay">
      <div id="panel">
        <h1 id="clientTitle">Video Sync Client</h1>
        <p id="slotLine">Preparing slot…</p>
        <p id="statusLine">Waiting for startup tap.</p>
        <button id="startButton" type="button">Start Playback</button>
      </div>
    </div>

    <div id="hud">
      <span id="hudLeft"></span>
      <span id="hudRight"></span>
    </div>

    <script type="module" src="/client.js"></script>
  </body>
</html>
